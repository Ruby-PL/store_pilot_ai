service: store_pilot_ai

image: ghcr.io/ruby-pl/store_pilot_ai

servers:
  web:
    - <%= ENV.fetch("KAMAL_WEB_HOST", "staging.storepilot.ai") %>
  job:
    hosts:
      - <%= ENV.fetch("KAMAL_JOB_HOST", "staging.storepilot.ai") %>
    cmd: bin/jobs

proxy:
  ssl: true
  host: <%= ENV.fetch("KAMAL_APP_HOST", "staging.storepilot.ai") %>

registry:
  server: ghcr.io
  username: Ruby-PL
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - SHOPIFY_API_KEY
    - SHOPIFY_API_SECRET
    - SHOPIFY_APP_URL
    - SHOPIFY_REDIRECT_URI
    - DATABASE_URL
    - CACHE_DATABASE_URL
    - QUEUE_DATABASE_URL
    - CABLE_DATABASE_URL
    - REDIS_URL
    - SENTRY_DSN
    - RESEND_API_KEY
  clear:
    APPLICATION_HOST: <%= ENV.fetch("APPLICATION_HOST", ENV.fetch("KAMAL_APP_HOST", "staging.storepilot.ai")) %>
    MAILER_FROM: <%= ENV.fetch("MAILER_FROM", "StorePilot <noreply@storepilot.ai>") %>
    RAILS_LOG_LEVEL: info
    RAILS_SERVE_STATIC_FILES: true
    JOB_CONCURRENCY: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
    SENTRY_ENVIRONMENT: staging
    SOLID_QUEUE_IN_PUMA: false

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

volumes:
  - "store_pilot_ai_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64
  args:
    RUBY_VERSION: 3.4.7
